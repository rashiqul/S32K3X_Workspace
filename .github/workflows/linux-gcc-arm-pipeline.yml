name: Linux GCC ARM Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

env:
  BUILD_TYPE: Release
  GCC_VERSION: 11

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  compliance-checks:
    name: Repository Compliance & Git History
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for linear history check
      
      - name: Check required files exist
        run: |
          echo "🔍 Checking repository compliance..."
          
          required_files=(
            "README.md"
            "LICENSE"
            "CMakeLists.txt"
            ".clang-format"
          )
          
          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
            fi
          done
          
          if [ ${#missing_files[@]} -ne 0 ]; then
            echo "❌ Missing required files:"
            printf '  - %s\n' "${missing_files[@]}"
            exit 1
          fi
          
          echo "✅ All required files present"
      
      - name: Check for linear git history
        run: |
          echo "🔍 Checking for linear git history..."
          
          # Get the base and head branches
          base_branch="${{ github.base_ref }}"
          head_branch="${{ github.head_ref }}"
          
          # Only check on pull requests (base_ref and head_ref are empty for push events)
          if [ -z "$base_branch" ] || [ -z "$head_branch" ]; then
            echo "⏭️  Skipping linear history check (not a PR)"
            exit 0
          fi
          
          # Fetch base branch from origin
          git fetch origin "$base_branch"
          
          # For PRs from forks, fetch the head branch from the PR head repo
          # For PRs from same repo, fetch from origin
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "📦 Fetching PR branch from fork: ${{ github.event.pull_request.head.repo.full_name }}"
            git fetch "https://github.com/${{ github.event.pull_request.head.repo.full_name }}" "$head_branch"
            head_ref="FETCH_HEAD"
          else
            echo "📦 Fetching PR branch from origin"
            git fetch origin "$head_branch"
            head_ref="origin/$head_branch"
          fi
          
          # Check if PR branch has merge commits (excluding merges from base)
          # Use the actual PR branch, not HEAD which might be a GitHub merge commit
          merge_commits=$(git log --merges --oneline "origin/$base_branch..$head_ref" | wc -l)
          
          if [ "$merge_commits" -gt 0 ]; then
            echo "❌ Non-linear history detected. Found $merge_commits merge commit(s)."
            echo "Please rebase your branch on top of $base_branch"
            git log --merges --oneline "origin/$base_branch..$head_ref"
            exit 1
          fi
          
          echo "✅ Linear git history verified"
      
      - name: Check commit messages
        run: |
          echo "🔍 Checking commit message format..."
          
          base_branch="${{ github.base_ref }}"
          
          # Only check on pull requests (base_ref is empty for push events)
          if [ -z "$base_branch" ]; then
            echo "⏭️  Skipping commit message check (not a PR)"
            exit 0
          fi
          
          # Fetch base branch
          git fetch origin "$base_branch"
          
          # Check each commit message in the PR
          set -e
          while IFS= read -r msg; do
            if [ ${#msg} -lt 10 ]; then
              echo "❌ Commit message too short (< 10 chars): '$msg'"
              exit 1
            fi
            if [ ${#msg} -gt 100 ]; then
              echo "⚠️  Warning: Commit message too long (> 100 chars): '$msg'"
            fi
          done < <(git log origin/$base_branch..HEAD --format=%s)
          
          echo "✅ Commit messages validated"

  environment-check:
    name: Environment Setup & Validation
    runs-on: ubuntu-latest
    needs: compliance-checks
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ env.GCC_VERSION }} 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ env.GCC_VERSION }} 100
      
      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            clang-format \
            shellcheck
      
      - name: Install Conan
        run: |
          pip3 install "conan>=2.0"
          conan --version
      
      - name: Verify environment
        run: |
          echo "🔍 Verifying build environment..."
          echo ""
          echo "GCC Version:"
          gcc --version | head -n1
          echo ""
          echo "G++ Version:"
          g++ --version | head -n1
          echo ""
          echo "CMake Version:"
          cmake --version | head -n1
          echo ""
          echo "Python Version:"
          python3 --version
          echo ""
          echo "Conan Version:"
          conan --version
          echo ""
          echo "Clang-Format Version:"
          clang-format --version
          echo ""
          echo "Shellcheck Version:"
          shellcheck --version | head -n1
          echo ""
          echo "✅ Environment validated"
      
      - name: Validate Conan ARM profile
        run: |
          echo "🔍 Validating Conan ARM profile..."
          
          profile=".conan/profiles/s32k3x_arm_cortex_m7"
          
          if [ ! -f "$profile" ]; then
            echo "❌ ARM profile not found: $profile"
            exit 1
          fi
          
          echo "✅ Profile file exists"
          
          # Check for required environment variables in profile
          if grep -q "(env)" "$profile"; then
            echo ""
            echo "📋 Profile uses environment variables:"
            grep "(env)" "$profile"
            
            # Extract and verify environment variables are documented
            env_vars=$(grep -oP '\(env\)\K[A-Z_]+' "$profile" || true)
            for var in $env_vars; do
              # Verify they're documented in README
              if grep -q "$var" README.md; then
                echo "  ✅ $var is documented in README"
              else
                echo "  ⚠️  $var should be documented in README"
              fi
            done
            
            echo ""
            echo "ℹ️  Note: Environment variable values will be validated in ARM build job"
          fi
          
          # Validate profile sections exist in raw file
          echo ""
          echo "Validating profile file structure..."
          
          if ! grep -q "\[settings\]" "$profile"; then
            echo "❌ Missing [settings] section"
            exit 1
          fi
          echo "  ✅ [settings] section present"
          
          if ! grep -q "\[buildenv\]" "$profile"; then
            echo "❌ Missing [buildenv] section"
            exit 1
          fi
          echo "  ✅ [buildenv] section present"
          
          echo ""
          echo "ℹ️  Full profile validation (with Conan) will run in ARM build job"

  lint-check:
    name: Code Format Verification (clang-format & shellcheck)
    runs-on: ubuntu-latest
    needs: environment-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install linting tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format shellcheck
      
      - name: Run shellcheck on scripts
        run: |
          echo "🐚 Running shellcheck on shell scripts..."
          
          # Find all shell scripts
          scripts=$(find scripts -type f -name "*.sh" 2>/dev/null || true)
          
          if [ -z "$scripts" ]; then
            echo "⚠️  No shell scripts found to check"
          else
            echo "Checking scripts:"
            echo "$scripts"
            echo ""
            
            shellcheck_errors=0
            for script in $scripts; do
              if ! shellcheck "$script"; then
                echo "❌ Shellcheck failed for: $script"
                shellcheck_errors=$((shellcheck_errors + 1))
              fi
            done
            
            if [ $shellcheck_errors -gt 0 ]; then
              echo ""
              echo "❌ Shellcheck found $shellcheck_errors file(s) with issues"
              exit 1
            fi
            
            echo "✅ All shell scripts passed shellcheck"
          fi
          echo ""
      
      - name: Run clang-format check
        run: |
          echo "🔍 Running clang-format check..."
          
          # Find all C/C++ source files
          files=$(find src test include -type f \( -name "*.c" -o -name "*.cpp" -o -name "*.h" -o -name "*.hpp" \) 2>/dev/null || true)
          
          if [ -z "$files" ]; then
            echo "⚠️  No C/C++ files found to check"
            exit 0
          fi
          
          echo "Checking files:"
          echo "$files"
          echo ""
          
          # Check formatting
          format_errors=0
          for file in $files; do
            if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
              echo "❌ Format error in: $file"
              echo "   Run: clang-format -i $file"
              format_errors=$((format_errors + 1))
            fi
          done
          
          if [ $format_errors -gt 0 ]; then
            echo ""
            echo "❌ Found $format_errors file(s) with formatting issues"
            echo "Please run 'clang-format -i' on the affected files"
            exit 1
          fi
          
          echo "✅ All files are properly formatted"

  build:
    name: Build & Compile (GCC)
    runs-on: ubuntu-latest
    needs: lint-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Setup GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ env.GCC_VERSION }} 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ env.GCC_VERSION }} 100
      
      - name: Install dependencies
        run: |
          sudo apt-get install -y cmake ninja-build python3 python3-pip
          pip3 install "conan>=2.0"
      
      - name: Install Conan dependencies
        run: |
          conan install . --output-folder=. --build=missing -s build_type=${{ env.BUILD_TYPE }} -pr:h .conan/profiles/s32k3x_workspace_linux -pr:b .conan/profiles/s32k3x_workspace_linux
      
      - name: Verify Conan setup
        run: |
          echo "📋 Verifying Conan generated files..."
          # Find the actual generator path created by cmake_layout
          TOOLCHAIN_PATH=$(find build_x86_64 -name "conan_toolchain.cmake" 2>/dev/null | head -1)
          if [ -z "$TOOLCHAIN_PATH" ]; then
            echo "❌ Error: conan_toolchain.cmake not found"
            echo "Directory structure:"
            find . -maxdepth 3 -type d | sort
            exit 1
          fi
          echo "✅ Found toolchain at: $TOOLCHAIN_PATH"
          echo "TOOLCHAIN_PATH=${PWD}/${TOOLCHAIN_PATH}" >> $GITHUB_ENV
      
      - name: Configure CMake with warning flags
        run: |
          cmake -S . -B build_x86_64/${{ env.BUILD_TYPE }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_PATH" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror -pedantic" \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Werror -pedantic"
      
      - name: Build project
        run: |
          echo "🔨 Building project..."
          
          # Use pipefail to catch build failures even when piping through tee
          set -o pipefail
          
          # Build and capture output
          cmake --build build_x86_64/${{ env.BUILD_TYPE }} 2>&1 | tee build_output.log
          
          echo "✅ Build completed successfully"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build_x86_64/
            !build_x86_64/conan/
            !build_x86_64/_deps/
          retention-days: 7

  conan-package:
    name: Conan Package Creation & Test
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Setup GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ env.GCC_VERSION }} 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ env.GCC_VERSION }} 100
      
      - name: Install dependencies
        run: |
          sudo apt-get install -y cmake ninja-build python3 python3-pip
          pip3 install "conan>=2.0"
      
      - name: Create Conan package
        run: |
          echo "📦 Creating Conan package..."
          
          # Create the package
          if ! conan create . --build=missing -s build_type=${{ env.BUILD_TYPE }} -pr:h .conan/profiles/s32k3x_workspace_linux -pr:b .conan/profiles/s32k3x_workspace_linux; then
            echo "❌ Conan package creation failed"
            exit 1
          fi
          
          echo "✅ Conan package created successfully"
      
      - name: Test Conan package
        run: |
          echo "🧪 Testing Conan package..."
          
          # Verify the package is in the cache using Conan 2
          conan list "s32k3x_workspace/*:*"
          
          echo "✅ Conan package validated"
      
      - name: Export package info
        run: |
          echo "📋 Package Information:"
          conan list "s32k3x_workspace/*:*"
          
          # Get package details
          echo ""
          echo "Package details:"
          conan info . || true

  unit-tests:
    name: Unit Tests Execution
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ env.GCC_VERSION }} 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ env.GCC_VERSION }} 100
      
      - name: Install dependencies
        run: |
          sudo apt-get install -y cmake ninja-build python3 python3-pip
          pip3 install "conan>=2.0"
      
      - name: Install Conan dependencies
        run: |
          conan install . --output-folder=. --build=missing -s build_type=${{ env.BUILD_TYPE }} -pr:h .conan/profiles/s32k3x_workspace_linux -pr:b .conan/profiles/s32k3x_workspace_linux
      
      - name: Configure and build with tests
        run: |
          TOOLCHAIN_PATH=$(find build_x86_64 -name "conan_toolchain.cmake" | head -1)
          cmake -S . -B build_x86_64/${{ env.BUILD_TYPE }} -G Ninja -DCMAKE_TOOLCHAIN_FILE="${PWD}/${TOOLCHAIN_PATH}" -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          cmake --build build_x86_64/${{ env.BUILD_TYPE }}
      
      - name: Run unit tests
        run: |
          echo "🧪 Running unit tests..."
          
          # Run CTest with verbose output
          if ! ctest --test-dir build_x86_64/${{ env.BUILD_TYPE }} --output-on-failure --verbose; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          
          echo "✅ All unit tests passed"
      
      - name: Generate test report
        if: always()
        run: |
          ctest --test-dir build_x86_64/${{ env.BUILD_TYPE }} --output-junit build_x86_64/${{ env.BUILD_TYPE }}/test-results.xml || true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build_x86_64/${{ env.BUILD_TYPE }}/test-results.xml
          retention-days: 30

  arm-build:
    name: ARM Cross-Compilation Build
    runs-on: ubuntu-latest
    needs: lint-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
      
      - name: Install Poetry
        run: |
          pip3 install poetry
          poetry --version
      
      - name: Install Conan
        run: |
          pip3 install "conan>=2.0"
          conan --version
      
      - name: Verify ARM toolchain
        run: |
          echo "🔍 Verifying ARM toolchain..."
          echo ""
          echo "ARM GCC Version:"
          arm-none-eabi-gcc --version | head -n1
          echo ""
          echo "ARM G++ Version:"
          arm-none-eabi-g++ --version | head -n1
          echo ""
          echo "ARM Binutils:"
          arm-none-eabi-as --version | head -n1
          echo ""
          echo "Toolchain location:"
          which arm-none-eabi-gcc
          echo ""
          echo "✅ ARM toolchain validated"
      
      - name: Set NXP_GCC_PATH for Conan profile
        run: |
          echo "Setting NXP_GCC_PATH environment variable..."
          # Get the directory containing arm-none-eabi-gcc
          toolchain_path=$(dirname $(which arm-none-eabi-gcc))
          echo "NXP_GCC_PATH=$toolchain_path" >> $GITHUB_ENV
          echo "✅ NXP_GCC_PATH=$toolchain_path"
      
      - name: Validate ARM profile environment variables
        run: |
          echo "🔍 Validating ARM profile environment variables..."
          
          profile=".conan/profiles/s32k3x_arm_cortex_m7"
          
          # Extract environment variables from profile
          env_vars=$(grep -oP '\(env\)\K[A-Z_]+' "$profile" || true)
          
          if [ -n "$env_vars" ]; then
            for var in $env_vars; do
              if [ -z "${!var}" ]; then
                echo "  ❌ $var is required but not set"
                exit 1
              else
                echo "  ✅ $var=${!var}"
              fi
            done
          fi
          
          echo "✅ All required environment variables are set"
      
      - name: Validate Conan ARM profile with environment
        run: |
          echo "🔍 Validating Conan ARM profile with resolved environment..."
          
          profile=".conan/profiles/s32k3x_arm_cortex_m7"
          abs_profile="$(pwd)/$profile"
          
          # Validate resolved profile with Conan (using absolute path for Conan 2.x compatibility)
          echo "Running: conan profile show \"$abs_profile\""
          if ! conan profile show "$abs_profile" > /tmp/conan_profile_output.txt 2>&1; then
            echo "❌ Conan cannot load profile. Error output:"
            cat /tmp/conan_profile_output.txt
            exit 1
          fi
          echo "✅ Conan can load profile"
          
          # Validate critical settings from resolved profile output
          echo ""
          echo "Validating ARM-specific settings in resolved profile..."
          profile_output=$(cat /tmp/conan_profile_output.txt)
          
          if ! echo "$profile_output" | grep -q "os=baremetal"; then
            echo "❌ Missing os=baremetal for embedded target"
            exit 1
          fi
          echo "  ✅ os=baremetal"
          
          if ! echo "$profile_output" | grep -q "arch=armv7hf"; then
            echo "⚠️  Expected arch=armv7hf for hard-float Cortex-M7"
          else
            echo "  ✅ arch=armv7hf"
          fi
          
          if ! echo "$profile_output" | grep -q "compiler=gcc"; then
            echo "❌ Missing compiler=gcc"
            exit 1
          fi
          echo "  ✅ compiler=gcc"
          
          echo ""
          echo "✅ Conan ARM profile fully validated"
      
      - name: Display ARM build info
        run: |
          echo "📋 ARM Build Configuration"
          echo "=========================="
          make arm-info || echo "Note: Makefile may need adjustment for CI environment"
      
      - name: Build ARM firmware
        run: |
          echo "🔨 Building ARM firmware for S32K358x (Cortex-M7)..."
          echo ""
          echo "Note: This is a skeleton build that verifies ARM compilation."
          echo "Complete firmware build requires BSP components and linker script."
          echo ""
          
          # Attempt ARM build - may need adjustment based on project state
          if make build_all_tgt 2>&1 | tee arm_build.log; then
            echo "✅ ARM build completed"
          else
            echo "⚠️  ARM build incomplete (expected at early project stage)"
            echo "Build log:"
            cat arm_build.log || true
            
            # Check if it's just missing BSP/linker components
            if grep -q "Startup code\|Linker script\|BSP" arm_build.log; then
              echo ""
              echo "ℹ️  ARM toolchain verified, awaiting BSP components"
              echo "✅ ARM compilation infrastructure validated"
              exit 0
            fi
            
            # Real error if not BSP-related
            exit 1
          fi
      
      - name: Verify build artifacts
        if: success()
        run: |
          echo "📦 Checking ARM build artifacts..."
          
          if [ -d "build_s32k" ]; then
            echo "✅ ARM build directory created"
            ls -lh build_s32k/ || true
            
            if [ -d "build_s32k/bin" ]; then
              echo ""
              echo "ARM binary outputs:"
              ls -lh build_s32k/bin/ || true
            fi
            
            if [ -d "build_s32k/obj" ]; then
              echo ""
              echo "ARM object files:"
              ls -lh build_s32k/obj/ || true
            fi
          else
            echo "ℹ️  ARM build directory pending full implementation"
          fi
      
      - name: Validate ARM binary architecture
        if: success()
        run: |
          echo "🔍 Validating ARM binary architecture..."
          
          # Find object files and libraries - check if any exist first
          object_count=$(find build_s32k \( -name "*.o" -o -name "*.a" \) 2>/dev/null | wc -l)
          
          if [ "$object_count" -eq 0 ]; then
            echo "⚠️  No ARM object files found to validate"
            echo "Build may be skeleton/incomplete - skipping architecture validation"
            exit 0
          fi
          
          echo "Checking architecture of built artifacts:"
          validation_failed=0
          
          # Use null-delimited read loop to handle paths with spaces safely
          while IFS= read -r -d '' obj; do
            arch_info=$(file "$obj")
            echo "  $obj:"
            echo "    $arch_info"
            
            # Verify it's ARM and NOT x86
            if echo "$arch_info" | grep -qi "ARM\|Thumb"; then
              echo "    ✅ Correct ARM architecture"
            elif echo "$arch_info" | grep -qi "x86\|80386\|x86-64"; then
              echo "    ❌ ERROR: x86 binary detected in ARM build!"
              validation_failed=1
            else
              echo "    ⚠️  Unknown architecture (may be archive index)"
            fi
          done < <(find build_s32k \( -name "*.o" -o -name "*.a" \) -print0 2>/dev/null)
          
          if [ $validation_failed -eq 1 ]; then
            echo ""
            echo "❌ ARM architecture validation failed!"
            echo "Some binaries are x86 instead of ARM. Check toolchain configuration."
            exit 1
          fi
          
          echo ""
          echo "✅ All ARM binaries validated successfully"
      
      - name: Upload ARM build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: arm-build-artifacts
          path: |
            build_s32k/
            arm_build.log
          retention-days: 7

  sonarqube:
    name: SonarQube Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build
    # Run on pushes and PRs from the same repo (not forks) - forks don't have access to SONAR_TOKEN
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      # SHA256 checksum of build-wrapper-linux-x86.zip - update when SonarCloud releases new version
      # To get current SHA256: curl -sL https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip | sha256sum
      SONAR_WRAPPER_SHA256: "779134ecc95e54a141b7f459a59145685837aafd0098dd8d3c0a54f45e866291"
      # SHA256 checksum of sonar-scanner-cli-6.2.1.4610-linux-x64.zip
      # To get current SHA256: curl -sL https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip | sha256sum
      SONAR_SCANNER_SHA256: "0b8a3049f0bd5de7abc1582c78c233960d3d4ed7cc983a1d1635e8552f8bb439"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${{ env.GCC_VERSION }} 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${{ env.GCC_VERSION }} 100
      
      - name: Install dependencies
        run: |
          sudo apt-get install -y cmake ninja-build python3 python3-pip
          pip3 install "conan>=2.0" gcovr
      
      - name: Install Conan dependencies
        run: |
          conan install . --output-folder=. --build=missing -s build_type=${{ env.BUILD_TYPE }} -pr:h .conan/profiles/s32k3x_workspace_linux -pr:b .conan/profiles/s32k3x_workspace_linux
      
      - name: Download SonarQube build wrapper
        run: |
          set -euo pipefail
          mkdir -p .sonar
          curl -sSfL -o .sonar/build-wrapper-linux-x86.zip \
            https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          if [ -z "${SONAR_WRAPPER_SHA256:-}" ]; then
            echo "ERROR: SONAR_WRAPPER_SHA256 is not set. Refusing to run unverified build-wrapper binary." >&2
            exit 1
          fi
          echo "${SONAR_WRAPPER_SHA256}  .sonar/build-wrapper-linux-x86.zip" | sha256sum -c
          unzip -o .sonar/build-wrapper-linux-x86.zip -d .sonar/
      
      - name: Configure CMake with coverage flags
        run: |
          TOOLCHAIN_PATH=$(find build_x86_64 -name "conan_toolchain.cmake" | head -1)
          cmake -S . -B build_x86_64/${{ env.BUILD_TYPE }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${PWD}/${TOOLCHAIN_PATH}" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCOVERAGE=ON
      
      - name: Build with SonarQube wrapper
        run: |
          .sonar/build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
            --out-dir bw-output \
            cmake --build build_x86_64/${{ env.BUILD_TYPE }}
      
      - name: Run tests with coverage
        run: |
          echo "🧪 Running tests with coverage for SonarQube analysis..."
          
          # Run tests
          ctest --test-dir build_x86_64/${{ env.BUILD_TYPE }} --output-on-failure
          
          # Generate coverage report in SonarQube format
          cd build_x86_64/${{ env.BUILD_TYPE }}
          
          # Clean up CMake's internal coverage files to avoid gcovr errors
          find CMakeFiles -name "*.gcno" -delete 2>/dev/null || true
          find CMakeFiles -name "*.gcda" -delete 2>/dev/null || true
          
          # Create coverage directory
          mkdir -p coverage
          
          # Run gcovr to generate SonarQube XML format using gcov matching GCC version
          gcovr --sonarqube coverage/sonarqube.xml \
            --root ../.. \
            --filter '^src/' \
            --filter '^include/' \
            --exclude '.*test.*' \
            --exclude '.*/googletest/.*' \
            --gcov-executable gcov-${{ env.GCC_VERSION }}
          
          echo "✅ Coverage report generated: coverage/sonarqube.xml"
          
          cd ../..
      
      - name: Download and install SonarScanner
        run: |
          set -euo pipefail
          mkdir -p .sonar
          curl -sSfL -o .sonar/sonar-scanner.zip \
            https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          
          # Verify SHA256 checksum
          if [ -z "${SONAR_SCANNER_SHA256:-}" ]; then
            echo "ERROR: SONAR_SCANNER_SHA256 is not set. Refusing to run unverified SonarScanner binary." >&2
            exit 1
          fi
          echo "${SONAR_SCANNER_SHA256}  .sonar/sonar-scanner.zip" | sha256sum -c
          
          unzip -o .sonar/sonar-scanner.zip -d .sonar/
          echo "$(pwd)/.sonar/sonar-scanner-6.2.1.4610-linux-x64/bin" >> $GITHUB_PATH
      
      - name: Run SonarQube Scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Base parameters for all scans
          SONAR_ARGS=(
            -Dsonar.projectKey=${{ github.repository_owner }}_S32K3X_Workspace
            -Dsonar.organization=rashiqul-sonar-workspace
            -Dsonar.sources=src,include
            -Dsonar.tests=test
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.coverageReportPaths=build_x86_64/${{ env.BUILD_TYPE }}/coverage/sonarqube.xml
            -Dsonar.host.url=https://sonarcloud.io
          )
          
          # Add PR-specific parameters if this is a pull request event
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SONAR_ARGS+=(
              -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
              -Dsonar.pullrequest.branch=${{ github.head_ref }}
              -Dsonar.pullrequest.base=${{ github.base_ref }}
            )
            echo "🔍 Running SonarQube analysis for PR #${{ github.event.pull_request.number }}"
          else
            SONAR_ARGS+=(
              -Dsonar.branch.name=${{ github.ref_name }}
            )
            echo "🔍 Running SonarQube analysis for branch ${{ github.ref_name }}"
          fi
          
          sonar-scanner "${SONAR_ARGS[@]}"

  pipeline-summary:
    name: Pipeline Status Summary
    runs-on: ubuntu-latest
    needs: [compliance-checks, environment-check, lint-check, build, arm-build, conan-package, unit-tests]
    if: always()
    
    steps:
      - name: Check pipeline status
        run: |
          echo "📊 Pipeline Execution Summary"
          echo "=============================="
          echo ""
          echo "Compliance Checks: ${{ needs.compliance-checks.result }}"
          echo "Environment Check: ${{ needs.environment-check.result }}"
          echo "Lint Check: ${{ needs.lint-check.result }}"
          echo "Build (x86_64): ${{ needs.build.result }}"
          echo "ARM Build (Cortex-M7): ${{ needs.arm-build.result }}"
          echo "Conan Package: ${{ needs.conan-package.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo ""
          
          if [ "${{ needs.compliance-checks.result }}" != "success" ] || \
             [ "${{ needs.environment-check.result }}" != "success" ] || \
             [ "${{ needs.lint-check.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.arm-build.result }}" != "success" ] || \
             [ "${{ needs.conan-package.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Pipeline failed. Please check the failed jobs above."
            exit 1
          fi
          
          echo ""
          echo "✅ All critical pipeline checks passed!"
